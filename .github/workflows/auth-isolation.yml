name: 鉴权隔离测试

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  auth-isolation-test:
    name: 数据隔离鉴权
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: e-hetong/package-lock.json

      - name: 安装依赖
        run: npm ci
        working-directory: ./e-hetong

      - name: 生成 Prisma Client
        run: npx prisma generate
        working-directory: ./e-hetong

      - name: 推送数据库 Schema（SQLite）
        run: npx prisma db push
        working-directory: ./e-hetong

      - name: 填充种子数据
        run: npx prisma db seed
        working-directory: ./e-hetong

      - name: 启动开发服务器（后台）
        run: |
          npm run dev &
          # 等待服务器就绪（最多 120 秒）
          for i in $(seq 1 120); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null | grep -q "200\|307\|302"; then
              echo "✅ 服务器已在第 ${i}s 就绪"
              break
            fi
            if [ $i -eq 120 ]; then
              echo "❌ 服务器启动超时"
              exit 1
            fi
            sleep 1
          done
        working-directory: ./e-hetong

      - name: 运行鉴权隔离测试
        run: npm run test:auth-isolation
        working-directory: ./e-hetong

      - name: 收集测试日志（失败时）
        if: failure()
        run: |
          echo "=== 服务器日志 ==="
          lsof -ti :3000 | xargs -I{} cat /proc/{}/fd/1 2>/dev/null || true
        working-directory: ./e-hetong
